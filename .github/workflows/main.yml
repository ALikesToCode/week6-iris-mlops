name: Iris API - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: steady-triumph-447006-f8
  REGION: asia-south1
  ZONE: asia-south1-a
  GAR_LOCATION: asia-south1-docker.pkg.dev
  SERVICE_NAME: iris-api
  IMAGE_NAME: iris-api

jobs:
  # Code Quality and Testing
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort httpx

    - name: Code formatting check (Black)
      run: black --check --diff . || echo "Formatting issues found, run 'black .' to fix"

    - name: Import sorting check (isort)
      run: isort --check-only --diff . || echo "Import sorting issues found, run 'isort .' to fix"

    - name: Linting (flake8)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting issues found"

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v || echo "Tests completed with some issues"

  # Build and Push Container Image
  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Google Artifact Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GAR_LOCATION }}
        username: _json_key
        password: ${{ secrets.GCP_SA_KEY }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/mlops-repo/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        
    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Install GKE plugin
      run: gcloud components install gke-gcloud-auth-plugin

    - name: Configure kubectl
      run: |
        gcloud container clusters get-credentials iris-api-cluster \
          --zone=${{ env.ZONE }} \
          --project=${{ env.PROJECT_ID }}

    - name: Deploy to development namespace
      env:
        IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
      run: |
        # Use only the first tag (main branch tag)
        SINGLE_TAG=$(echo "${IMAGE_TAG}" | head -n1)
        echo "Using image tag: $SINGLE_TAG"
        
        # Update image in deployment
        sed -i "s|gcr.io/steady-triumph-447006-f8/iris-api:latest|${SINGLE_TAG}|g" k8s/deployment.yaml
        
        # Apply to development namespace
        kubectl create namespace development --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f k8s/ -n development
        
        # Wait for rollout
        kubectl rollout status deployment/iris-api -n development --timeout=300s

    - name: Run smoke tests
      run: |
        # Get service endpoint
        kubectl port-forward -n development service/iris-api-service 8080:80 &
        PF_PID=$!
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:8080/health || exit 1
        
        # Test prediction
        curl -X POST "http://localhost:8080/predict" \
          -H "Content-Type: application/json" \
          -d '{"sepal_length": 5.1, "sepal_width": 3.5, "petal_length": 1.4, "petal_width": 0.2}' || exit 1
        
        kill $PF_PID
        echo "Development deployment successful!"

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        
    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Install GKE plugin
      run: gcloud components install gke-gcloud-auth-plugin

    - name: Configure kubectl
      run: |
        gcloud container clusters get-credentials iris-api-cluster \
          --zone=${{ env.ZONE }} \
          --project=${{ env.PROJECT_ID }}

    - name: Deploy to production using Blue-Green
      env:
        IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
      run: |
        # Use only the first tag (main branch tag)
        SINGLE_TAG=$(echo "${IMAGE_TAG}" | head -n1)
        echo "Using image tag: $SINGLE_TAG"
        
        # Update image in deployment
        sed -i "s|gcr.io/steady-triumph-447006-f8/iris-api:latest|${SINGLE_TAG}|g" k8s/deployment.yaml
        
        # Deploy as green (challenger)
        sed -i 's/app: iris-api$/app: iris-api-green/g' k8s/deployment.yaml
        sed -i 's/name: iris-api$/name: iris-api-green/g' k8s/deployment.yaml
        
        kubectl apply -f k8s/deployment.yaml -n iris-api
        kubectl rollout status deployment/iris-api-green -n iris-api --timeout=300s

    - name: Validate Green Deployment
      run: |
        # Test green deployment
        kubectl port-forward -n iris-api service/iris-api-green 8080:80 &
        PF_PID=$!
        sleep 10
        
        # Validate health
        curl -f http://localhost:8080/health || exit 1
        
        # Test prediction
        result=$(curl -s -X POST "http://localhost:8080/predict" \
          -H "Content-Type: application/json" \
          -d '{"sepal_length": 5.1, "sepal_width": 3.5, "petal_length": 1.4, "petal_width": 0.2}')
        
        echo "Prediction result: $result"
        echo "$result" | grep -q "setosa" || exit 1
        
        kill $PF_PID
        echo "Green deployment validation passed!"

    - name: Switch Traffic to Green (Blue-Green Deployment)
      run: |
        # Update service selector to point to green
        kubectl patch service iris-api-service -n iris-api -p '{"spec":{"selector":{"app":"iris-api-green"}}}'
        
        # Wait for service update
        sleep 30
        
        # Verify production traffic
        kubectl port-forward -n iris-api service/iris-api-service 8080:80 &
        PF_PID=$!
        sleep 10
        
        curl -f http://localhost:8080/health || exit 1
        
        kill $PF_PID
        
        # Clean up old blue deployment
        kubectl delete deployment iris-api -n iris-api --ignore-not-found=true
        
        # Rename green to blue for next cycle
        kubectl patch deployment iris-api-green -n iris-api -p '{"metadata":{"name":"iris-api"},"spec":{"selector":{"matchLabels":{"app":"iris-api"}},"template":{"metadata":{"labels":{"app":"iris-api"}}}}}'
        
        echo "Blue-Green deployment completed successfully!"

  # Notify Success
  notify:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: always()

    steps:
    - name: Deployment Status
      run: |
        if [ "${{ needs.deploy-prod.result }}" == "success" ]; then
          echo "🎉 Production deployment successful!"
          echo "Repository: https://github.com/ALikesToCode/week6-iris-mlops"
        else
          echo "❌ Deployment failed. Check logs above."
          exit 1
        fi