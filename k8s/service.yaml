apiVersion: v1
kind: Service
metadata:
  name: iris-api-service
  namespace: iris-api
  labels:
    app: iris-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: mlflow
  selector:
    app: iris-api