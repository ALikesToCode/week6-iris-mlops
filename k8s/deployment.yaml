apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-api
  namespace: iris-api
  labels:
    app: iris-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iris-api
  template:
    metadata:
      labels:
        app: iris-api
        version: v1
    spec:
      initContainers:
      - name: setup-permissions
        image: busybox:1.35
        command: ['sh', '-c', 'mkdir -p /app/artifacts /app/mlruns && chown -R 1000:1000 /app/artifacts /app/mlruns']
        volumeMounts:
        - name: artifacts-storage
          mountPath: /app/artifacts
        - name: mlflow-storage
          mountPath: /app/mlruns
        securityContext:
          runAsUser: 0
      containers:
      - name: iris-api
        image: gcr.io/steady-triumph-447006-f8/iris-api:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: API_VERSION
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: API_VERSION
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: LOG_LEVEL
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MODEL_PATH
        - name: DATA_PATH
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: DATA_PATH
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_BACKEND_STORE_URI
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_BACKEND_STORE_URI
        - name: MLFLOW_ARTIFACT_ROOT
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_ARTIFACT_ROOT
        volumeMounts:
        - name: artifacts-storage
          mountPath: /app/artifacts
        - name: mlflow-storage
          mountPath: /app/mlruns
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
      
      # MLflow tracking server sidecar
      - name: mlflow-server
        image: python:3.10-slim
        command: ["/bin/bash"]
        args: 
        - -c
        - |
          pip install mlflow==2.8.1 && \
          mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri sqlite:////app/mlruns/mlflow.db \
            --default-artifact-root /app/mlruns \
            --workers 1
        ports:
        - name: mlflow-ui
          containerPort: 5000
          protocol: TCP
        env:
        - name: MLFLOW_BACKEND_STORE_URI
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_BACKEND_STORE_URI
        - name: MLFLOW_ARTIFACT_ROOT
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_ARTIFACT_ROOT
        volumeMounts:
        - name: mlflow-storage
          mountPath: /app/mlruns
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 15
      
      volumes:
      - name: artifacts-storage
        emptyDir: {}
      - name: mlflow-storage
        emptyDir: {}