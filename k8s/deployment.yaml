apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-api
  namespace: iris-api
  labels:
    app: iris-api
    version: v1
spec:
  # SCALABILITY: Start with 2 replicas but HPA will auto-scale from 3-20 based on load
  replicas: 2
  selector:
    matchLabels:
      app: iris-api
  template:
    metadata:
      labels:
        app: iris-api
        version: v1
    spec:
      initContainers:
      - name: setup-permissions
        image: busybox:1.35
        command: ['sh', '-c', 'mkdir -p /app/artifacts /app/mlruns && chown -R 1000:1000 /app/artifacts /app/mlruns']
        volumeMounts:
        - name: artifacts-storage
          mountPath: /app/artifacts
        - name: mlflow-storage
          mountPath: /app/mlruns
        securityContext:
          runAsUser: 0
      containers:
      - name: iris-api
        image: gcr.io/steady-triumph-447006-f8/iris-api:v2-concurrent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        # SCALABILITY: Configure thread pool size for concurrent inference processing
        - name: MAX_WORKERS
          value: "8"  # Enables concurrent model inference across 8 worker threads
        # SCALABILITY: Large cache size for prediction reuse to reduce inference load
        - name: CACHE_SIZE
          value: "2000"  # Cache up to 2000 predictions to improve response times
        - name: API_VERSION
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: API_VERSION
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: LOG_LEVEL
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MODEL_PATH
        - name: DATA_PATH
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: DATA_PATH
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_BACKEND_STORE_URI
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_BACKEND_STORE_URI
        - name: MLFLOW_ARTIFACT_ROOT
          valueFrom:
            configMapKeyRef:
              name: iris-api-config
              key: MLFLOW_ARTIFACT_ROOT
        volumeMounts:
        - name: artifacts-storage
          mountPath: /app/artifacts
        - name: mlflow-storage
          mountPath: /app/mlruns
        # SCALABILITY: Enhanced resource allocation for concurrent processing
        resources:
          requests:
            memory: "256Mi"  # Base memory for model loading and caching
            cpu: "200m"      # Baseline CPU for steady-state operations
          limits:
            memory: "1Gi"    # Allow up to 1GB for large batch processing
            cpu: "1000m"     # Full CPU core for high-concurrency inference
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
      
      volumes:
      - name: artifacts-storage
        emptyDir: {}
      - name: mlflow-storage
        emptyDir: {}