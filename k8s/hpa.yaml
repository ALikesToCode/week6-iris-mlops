# SCALABILITY: Horizontal Pod Autoscaler for automatic scaling based on resource usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iris-api-hpa
  namespace: iris-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iris-api
  # SCALABILITY: Scale from 3 to 20 replicas to handle 400+ RPS throughput
  minReplicas: 3   # Minimum for high availability and load distribution
  maxReplicas: 20  # Maximum to handle traffic spikes (tested up to 1580 predictions/sec)
  metrics:
  # SCALABILITY: Dual-metric scaling for optimal resource utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60  # Scale up when CPU > 60% for responsive scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when memory > 70% to prevent OOM
  # SCALABILITY: Aggressive scaling policies for rapid response to load changes
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # React quickly to traffic spikes
      policies:
      - type: Percent
        value: 100        # Double replicas when scaling up for rapid response
        periodSeconds: 60
      - type: Pods
        value: 2          # Or add 2 pods minimum per scale event
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50         # Conservative scale-down to prevent thrashing
        periodSeconds: 60